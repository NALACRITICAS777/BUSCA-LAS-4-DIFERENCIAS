<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST DE AGUDEZA VISUAL</title>

    <style>
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #000;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        h1 {
            color: #ff0000;
            font-size: 3.5rem;
            margin: 15px 0;
            text-shadow: 3px 3px #fff;
        }

        .instrucciones-box {
            background-color: #ffff00;
            color: #000;
            padding: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            border-bottom: 5px solid #ff0000;
        }

        .game-canvas {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            height: 65vh;
        }

        .img-dif {
            flex: 1;
            border: 5px solid #fff;
            background-image: url('https://img.freepik.com/foto-gratis/paisaje-niebla-matutina-montanas-globos-aerostaticos-al-amanecer_335224-794.jpg');
            background-size: cover;
            background-position: center;
        }

        .footer-text {
            color: #aaa;
            font-style: italic;
            margin-top: 10px;
        }

        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 99999;
        }

        #screamer-img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
    </style>
</head>

<body onclick="iniciar()">

    <div id="ui-main">
        <h1>¿DÓNDE ESTÁ LA DIFERENCIA?</h1>

        <div class="instrucciones-box">
            NIVEL: IMPOSIBLE. Encuentra las 4 diferencias.
        </div>

        <div class="game-canvas">
            <div class="img-dif"></div>
            <div class="img-dif"></div>
        </div>

        <p class="footer-text">Haz clic para empezar</p>
    </div>

    <div id="screamer-overlay">
        <img id="screamer-img"
            src="https://preview.redd.it/ay%C3%BAdemen-en-buscar-un-v%C3%ADdeo-screamer-v0-ch0c9q0p6p9c1.jpeg"
            alt="BOO!">

        <audio id="scream-audio" preload="auto">
            <source src="https://www.myinstants.com/media/sounds/jeff-the-killer-scream.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        let activado = false;
        let audioDesbloqueado = false;

        function iniciar() {
            const audio = document.getElementById('scream-audio');

            // 🔓 Desbloquear audio en el primer click
            if (!audioDesbloqueado) {
                audio.muted = true;
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    audio.muted = false;
                    audioDesbloqueado = true;
                });
            }

            if (activado) return;
            activado = true;

            document.querySelector('.footer-text').innerText = "busca las 4 diferencias";
            document.querySelector('.footer-text').style.color = "#00ff00";

            setTimeout(() => {
                soltarScreamer();
            }, 8000);
        }

        function soltarScreamer() {
            const overlay = document.getElementById('screamer-overlay');
            const audio = document.getElementById('scream-audio');

            overlay.style.display = 'block';

            audio.volume = 1.0; // máximo permitido
            audio.play().catch(err => console.log("Error audio:", err));

            window.onkeydown = function () {
                return false;
            };
        }
    </script>

</body>
</html>
