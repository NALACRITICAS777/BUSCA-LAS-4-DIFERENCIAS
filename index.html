<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reto Auditivo</title>

<style>
body {
    font-family: system-ui;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #e2e8f0;
    margin: 0;
    text-align: center;
}

/* fade entrada */
.container {
    margin-top: 8vh;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 { font-size: 2.5rem; }
.sub { color: #cbd5f5; }

button {
    background: #22c55e;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    cursor: pointer;
}

/* opciones */
.options {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    margin: 10px;
    padding: 10px;
    border-radius: 16px;
    width: 140px;
    cursor: pointer;
    transition: 0.25s;
}

.card:hover {
    transform: scale(1.08);
}

.card img {
    width: 100%;
}

/* contador */
.counter {
    position: fixed;
    top: 15px;
    right: 20px;
}

/* correcto overlay */
#correct-overlay {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 5;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #4ade80;
}

/* screamer */
#screamer {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 10;
}

#screamer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* flash */
#flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    z-index: 9;
}

.shake {
    animation: shake 0.05s infinite;
}

@keyframes shake {
    50% {transform: translate(-2px,-2px);}
}
</style>
</head>

<body>

<div class="counter" id="counter">1/4</div>

<div class="container">
    <h1>🎧 Reto Auditivo</h1>
    <p class="sub">Escucha y elige el animal</p>

    <button onclick="playAudio()">▶ Reproducir</button>

    <div class="options" id="options"></div>
</div>

<div id="correct-overlay">✔ Correcto</div>

<div id="flash"></div>

<div id="screamer">
    <img src="archivos/screamer.gif">
    <audio id="boom" src="archivos/nightmare.mp3"></audio>
</div>

<script>
let round = 0;
let currentAudio = null;

const rounds = [
    {audio:"archivos/gato.mp3", correct:"gato", options:["gato","perro","vaca"]},
    {audio:"archivos/rana.mp3", correct:"rana", options:["rana","gato","perro"]},
    {audio:"archivos/ballena.mp3", correct:"ballena", options:["ballena","vaca","rana"]},
    {audio:"archivos/gaviota.mp3", correct:"gaviota", options:["gaviota","gato","perro"]}
];

function loadRound() {
    stopAudio();

    document.getElementById("counter").innerText = `${round+1}/4`;

    let container = document.getElementById("options");
    container.innerHTML = "";

    rounds[round].options.forEach(animal => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<img src="archivos/${animal}.png"><p>${animal}</p>`;
        div.onclick = () => select(animal);
        container.appendChild(div);
    });
}

function playAudio() {
    stopAudio();

    let audio = new Audio(rounds[round].audio);
    currentAudio = audio;

    // volumen bajo
    audio.volume = [0.08,0.15,0.25,0.08][round];

    audio.play().catch(()=>{});
}

function stopAudio() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }
}

function select(animal) {
    if (animal !== rounds[round].correct) {
        alert("Incorrecto");
        return;
    }

    stopAudio();

    let overlay = document.getElementById("correct-overlay");
    overlay.style.display = "flex";

    setTimeout(() => {
        overlay.style.display = "none";

        if (round === rounds.length - 1) {
            jumpscare();
        } else {
            round++;
            loadRound();
        }
    }, 600);
}

function jumpscare() {
    document.getElementById("flash").style.opacity = 1;

    setTimeout(()=>{
        document.getElementById("flash").style.opacity = 0;
    },100);

    setTimeout(()=>{
        document.getElementById("screamer").style.display = "block";
        document.body.classList.add("shake");

        let audio = document.getElementById("boom");
        audio.volume = 1;
        audio.play().catch(()=>{});
    },80);
}

loadRound();
</script>

</body>
</html>
