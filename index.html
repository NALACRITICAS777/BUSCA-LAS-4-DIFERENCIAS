<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reto Auditivo</title>

<style>
body {
    font-family: system-ui, Arial;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #e2e8f0;
    margin: 0;
    text-align: center;
}

/* contenedor */
.container {
    margin-top: 8vh;
}

/* título */
h1 {
    font-size: 2.5rem;
    margin-bottom: 5px;
}

.sub {
    color: #cbd5f5;
    margin-bottom: 25px;
}

/* botón */
button {
    background: #22c55e;
    color: black;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

button:hover {
    background: #16a34a;
}

/* opciones */
.options {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
}

.card {
    background: #1e293b;
    margin: 10px;
    padding: 10px;
    border-radius: 16px;
    width: 140px;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 5px 10px rgba(0,0,0,0.4);
}

.card:hover {
    transform: scale(1.08);
    background: #334155;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card p {
    margin-top: 8px;
    font-weight: bold;
}

/* contador */
.counter {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 14px;
    color: #cbd5f5;
}

/* correcto */
#correct-overlay {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 9997;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    font-weight: bold;
    color: #4ade80;
}

/* screamer */
#screamer {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 9999;
}

#screamer img {
    width: 100%;
    height: 100%;
    object-fit: fill;
}

/* flash */
#flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    z-index: 9998;
}

/* vibración */
.shake {
    animation: shake 0.05s infinite;
}

@keyframes shake {
    0% {transform: translate(2px,2px);}
    50% {transform: translate(-2px,-2px);}
    100% {transform: translate(2px,2px);}
}
</style>
</head>

<body>

<div class="counter" id="counter">1/4</div>

<div class="container">
    <h1>🎧 Reto Auditivo</h1>
    <p class="sub">Escucha el sonido y selecciona el animal correcto</p>

    <button onclick="playAudio()">▶ Reproducir sonido</button>

    <div class="options" id="options"></div>
</div>

<div id="correct-overlay">✔ Correcto</div>

<div id="flash"></div>

<div id="screamer">
    <img src="archivos/screamer.gif">
    <audio id="boom">
        <source src="archivos/nightmare.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
let round = 0;

const rounds = [
    {
        audio: "archivos/gato.mp3",
        correct: "gato",
        options: ["gato","perro","vaca"]
    },
    {
        audio: "archivos/rana.mp3",
        correct: "rana",
        options: ["rana","gato","perro"]
    },
    {
        audio: "archivos/ballena.mp3",
        correct: "ballena",
        options: ["ballena","vaca","rana"]
    },
    {
        audio: "archivos/gaviota.mp3",
        correct: "gaviota",
        options: ["gaviota","gato","perro"]
    }
];

function loadRound() {
    document.getElementById("counter").innerText = `${round+1}/4`;

    let container = document.getElementById("options");
    container.innerHTML = "";

    rounds[round].options.forEach(animal => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="archivos/${animal}.png">
            <p>${animal}</p>
        `;

        div.onclick = () => select(animal);
        container.appendChild(div);
    });
}

function playAudio() {
    let audio = new Audio(rounds[round].audio);

    // 🔊 volumen MÁS bajo
    if (round === 0) audio.volume = 0.08;
    else if (round === 1) audio.volume = 0.15;
    else if (round === 2) audio.volume = 0.25;
    else audio.volume = 0.08;

    audio.play();
}

function select(animal) {
    if (animal === rounds[round].correct) {

        let overlay = document.getElementById("correct-overlay");
        overlay.style.display = "flex";

        setTimeout(() => {
            overlay.style.display = "none";

            if (round === rounds.length - 1) {
                jumpscare();
            } else {
                round++;
                loadRound();
            }

        }, 600);

    } else {
        alert("Incorrecto, intenta nuevamente");
    }
}

function jumpscare() {
    document.getElementById("flash").style.opacity = 1;

    setTimeout(() => {
        document.getElementById("flash").style.opacity = 0;
    }, 100);

    setTimeout(() => {
        document.getElementById("screamer").style.display = "block";
        document.body.classList.add("shake");

        let audio = document.getElementById("boom");
        audio.volume = 1;
        audio.play();
    }, 80);
}

loadRound();
</script>

</body>
</html>
