<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adivina el Animal</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #6366f1, #0ea5e9);
    color: white;
    text-align: center;
}

/* contenedor */
.container {
    margin-top: 8vh;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h1 {
    font-size: 2.8rem;
}

/* botón */
button {
    background: #facc15;
    color: black;
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
}

button:hover {
    background: #fde047;
}

/* opciones */
.options {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
}

.card {
    background: white;
    color: black;
    margin: 12px;
    padding: 12px;
    border-radius: 18px;
    width: 150px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.card:hover {
    transform: scale(1.1);
}

.card img {
    width: 100%;
    border-radius: 12px;
}

/* contador */
.counter {
    position: fixed;
    top: 15px;
    right: 20px;
    font-weight: bold;
}

/* overlays base */
.overlay {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
}

/* correcto */
#correct-overlay {
    background: rgba(0,0,0,0.6);
    font-size: 4rem;
    color: #22c55e;
    z-index: 100;
}

/* flash */
#flash {
    background: white;
    opacity: 0;
    z-index: 200;
}

/* screamer */
#screamer {
    z-index: 300;
}

#screamer img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;

    /* 🔥 ZOOM BRUTAL */
    transform: scale(0.8);
    animation: zoom 0.4s forwards;
}

@keyframes zoom {
    to { transform: scale(1.6); }
}

/* vibración */
.shake {
    animation: shake 0.05s infinite;
}

@keyframes shake {
    50% { transform: translate(-4px,-4px); }
}
</style>
</head>

<body>

<div class="counter" id="counter">1/4</div>

<div class="container">
    <h1>🎧 Adivina el Animal</h1>
    <p>Escucha el sonido y selecciona el correcto</p>

    <button onclick="playAudio()">🔊 Escuchar</button>

    <div class="options" id="options"></div>
</div>

<div id="correct-overlay" class="overlay">✔</div>
<div id="flash" class="overlay"></div>

<div id="screamer" class="overlay">
    <img src="archivos/screamer.png">
    <audio id="boom" src="archivos/nightmare.mp3"></audio>
</div>

<script>
let round = 0;
let currentAudio = null;

const rounds = [
    {audio:"archivos/gato.mp3", correct:"gato", options:["gato","perro","vaca"]},
    {audio:"archivos/rana.mp3", correct:"rana", options:["rana","gato","perro"]},
    {audio:"archivos/ballena.mp3", correct:"ballena", options:["ballena","vaca","rana"]},
    {audio:"archivos/gaviota.mp3", correct:"gaviota", options:["gaviota","gato","perro"]}
];

function loadRound() {
    stopAudio();

    document.getElementById("counter").innerText = `${round+1}/4`;

    let container = document.getElementById("options");
    container.style.opacity = 0;

    setTimeout(() => {
        container.innerHTML = "";

        rounds[round].options.forEach(animal => {
            let div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="archivos/${animal}.png">
                <p>${animal}</p>
            `;

            div.onclick = () => select(animal);
            container.appendChild(div);
        });

        container.style.opacity = 1;
    }, 200);
}

function playAudio() {
    stopAudio();

    let audio = new Audio(rounds[round].audio);
    currentAudio = audio;

    audio.volume = [0.04,0.08,0.15,0.05][round];

    audio.play().catch(()=>{});
}

function stopAudio() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }
}

function select(animal) {
    if (animal !== rounds[round].correct) {
        alert("Incorrecto");
        return;
    }

    stopAudio();

    let overlay = document.getElementById("correct-overlay");
    overlay.style.display = "flex";

    setTimeout(() => {
        overlay.style.display = "none";

        if (round === rounds.length - 1) {
            jumpscare();
        } else {
            round++;
            loadRound();
        }
    }, 600);
}

function jumpscare() {
    let flash = document.getElementById("flash");
    let screamer = document.getElementById("screamer");

    flash.style.display = "flex";
    flash.style.opacity = 1;

    setTimeout(()=> flash.style.opacity = 0, 120);

    setTimeout(()=>{
        screamer.style.display = "flex";
        document.body.classList.add("shake");

        let audio = document.getElementById("boom");
        audio.volume = 1;
        audio.play().catch(()=>{});
    }, 140);
}

loadRound();
</script>

</body>
</html>
